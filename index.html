<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゴルフ スイング分析</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Golf">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-bottom: 32px;
    }
    #topbar {
      width: 100%; padding: 6px 12px;
      background: #0f1626;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.78rem; color: #889;
    }
    #topbar .ver { color: #7ecf7e; font-weight: bold; }
    h1 { margin: 12px 0 6px; font-size: 1.3rem; color: #7ecf7e; }
    #status { font-size: 0.85rem; color: #aaa; margin-bottom: 8px; min-height: 1.2em; text-align: center; padding: 0 8px; }
    .btn-row { display: flex; gap: 8px; margin: 8px 0; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 10px 18px;
      background: #7ecf7e; color: #1a1a2e;
      border: none; border-radius: 20px;
      font-size: 0.9rem; font-weight: bold; cursor: pointer;
    }
    .btn.secondary { background: #4a90d9; color: #fff; }
    .btn.tertiary { background: #2a3655; color: #cdd; }
    .btn.small { padding: 6px 12px; font-size: 0.8rem; }
    .btn.toggled { outline: 2px solid #7ecf7e; }
    .btn:disabled { opacity: 0.5; cursor: default; }
    #canvas-area { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 8px; }
    .canvas-wrapper { position: relative; width: 100%; }
    .canvas-wrapper video {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover; opacity: 0;
    }
    .canvas-wrapper canvas {
      display: block; width: 100%; aspect-ratio: 3/4;
      background: #000; border-radius: 8px;
    }
    .canvas-wrapper .label {
      position: absolute; top: 6px; left: 8px;
      font-size: 0.75rem; color: #7ecf7e; background: rgba(0,0,0,0.5);
      padding: 2px 8px; border-radius: 10px;
    }
    #wrapper-b { display: none; }
    body.compare #wrapper-b { display: block; }
    #controls {
      display: none; width: 100%; max-width: 480px;
      margin-top: 8px; padding: 8px 12px;
      background: #16213e; border-radius: 8px;
      align-items: center; gap: 8px;
    }
    #controls.active { display: flex; }
    #btn-play {
      background: #7ecf7e; color: #1a1a2e; border: none;
      border-radius: 50%; width: 40px; height: 40px;
      font-size: 1rem; cursor: pointer; flex-shrink: 0;
    }
    #seek { flex: 1; accent-color: #7ecf7e; }
    #speed {
      background: #1a1a2e; color: #eee; border: 1px solid #444;
      border-radius: 6px; padding: 4px; font-size: 0.85rem;
    }
    .panel {
      width: 100%; max-width: 480px;
      margin-top: 10px; padding: 12px 16px;
      background: #16213e; border-radius: 8px;
      font-size: 0.9rem; line-height: 1.8;
    }
    .panel h2 { font-size: 0.95rem; color: #7ecf7e; margin-bottom: 6px; }
    .angle-row { display: flex; justify-content: space-between; }
    .angle-label { color: #aaa; }
    .angle-value { font-weight: bold; color: #fff; }
    #graph { width: 100%; height: 140px; background: #0f1626; border-radius: 6px; touch-action: none; }
    #panel-3d { display: none; }
    #panel-3d.active { display: block; }
    #view3d {
      width: 100%; height: 280px; background: #0f1626;
      border-radius: 6px; touch-action: none; cursor: grab;
    }
    #keyframes { display: none; }
    #keyframes.active { display: block; }
    #kf-buttons { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0; }
    #tempo-display { font-size: 1.1rem; font-weight: bold; }
    #tempo-display.good { color: #7ecf7e; }
    #tempo-display.off { color: #e0a040; }
    #history-list { list-style: none; font-size: 0.82rem; }
    #history-list li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid #233;
      gap: 8px;
    }
    #history-list img { width: 48px; border-radius: 4px; flex-shrink: 0; }
    #history-list .hist-info { flex: 1; }
    #history-list .del { background: none; border: none; color: #c66; cursor: pointer; font-size: 1rem; }
    .note { font-size: 0.72rem; color: #778; }
  </style>
</head>
<body>
  <div id="topbar">
    <span>⚙️ Golf Swing Analyzer</span>
    <span class="ver" id="app-ver"></span>
  </div>
  <h1>🏌️ スイング分析</h1>
  <div id="status">カメラ起動 または 動画を選択してください</div>

  <div class="btn-row">
    <button id="btn-camera" class="btn">カメラ</button>
    <button id="btn-video" class="btn secondary">動画を選ぶ</button>
    <button id="btn-compare" class="btn tertiary">比較+</button>
    <input type="file" id="file-input" accept="video/*" hidden>
    <input type="file" id="file-input-b" accept="video/*" hidden>
  </div>
  <div class="btn-row">
    <button id="btn-trail" class="btn small tertiary toggled">軌跡 ON</button>
    <button id="btn-ball" class="btn small tertiary">ボール OFF</button>
    <button id="btn-trail-clear" class="btn small tertiary">軌跡クリア</button>
    <button id="btn-analyze" class="btn small" disabled>スイング解析</button>
    <button id="btn-3d" class="btn small tertiary">3D 表示</button>
  </div>

  <div id="canvas-area">
    <div class="canvas-wrapper" id="wrapper-a">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="canvas"></canvas>
      <span class="label" id="label-a" style="display:none">A</span>
    </div>
    <div class="canvas-wrapper" id="wrapper-b">
      <video id="video-b" playsinline muted></video>
      <canvas id="canvas-b"></canvas>
      <span class="label">B</span>
    </div>
  </div>

  <div id="controls">
    <button id="btn-play">▶</button>
    <input type="range" id="seek" min="0" max="1000" value="0">
    <select id="speed">
      <option value="1">1x</option>
      <option value="0.5">0.5x</option>
      <option value="0.25">0.25x</option>
      <option value="0.1">0.1x</option>
    </select>
  </div>

  <div class="panel">
    <h2>関節角度</h2>
    <div class="angle-row">
      <span class="angle-label">左肩–腰–膝（前傾）</span>
      <span class="angle-value" id="val-torso">--°</span>
    </div>
    <div class="angle-row">
      <span class="angle-label">右肩–腰–膝（前傾）</span>
      <span class="angle-value" id="val-torso-r">--°</span>
    </div>
    <div class="angle-row">
      <span class="angle-label">左膝角度</span>
      <span class="angle-value" id="val-knee-l">--°</span>
    </div>
    <div class="angle-row">
      <span class="angle-label">右膝角度</span>
      <span class="angle-value" id="val-knee-r">--°</span>
    </div>
  </div>

  <div class="panel" id="keyframes">
    <h2>キーフレーム / テンポ <span class="note">(ベータ: 手首の動きから推定)</span></h2>
    <div id="kf-buttons"></div>
    <div class="angle-row">
      <span class="angle-label">テンポ (バック:ダウン)</span>
      <span id="tempo-display">--</span>
    </div>
    <div class="angle-row">
      <span class="angle-label">前傾キープ度 (変動幅)</span>
      <span class="angle-value" id="posture-keep">--</span>
    </div>
  </div>

  <div class="panel" id="panel-3d">
    <h2>3D スイング比較 <span class="note">(ベータ: 単眼推定のため奥行きは目安。ドラッグで回転)</span></h2>
    <canvas id="view3d"></canvas>
    <div class="btn-row">
      <button id="btn-3d-reset" class="btn small tertiary">視点リセット</button>
      <button id="btn-3d-flip" class="btn small tertiary">B 左右反転</button>
    </div>
    <div class="note">自分=緑 / 比較動画B=青。Bはキーフレームで時間合わせ、体格は正規化済み</div>
  </div>

  <div class="panel">
    <h2>角度の時系列 <span class="note">(タップでシーク)</span></h2>
    <canvas id="graph"></canvas>
  </div>

  <div class="panel">
    <h2>解析履歴 <span class="note">(端末内保存・最大20件)</span></h2>
    <ul id="history-list"></ul>
    <div class="btn-row">
      <button id="btn-export" class="btn small tertiary">JSONエクスポート</button>
    </div>
  </div>

  <script>
    // モジュール (CDN) の読み込みに失敗してもバージョンは必ず表示する
    // ※ ここを変えたら sw.js の CACHE 名も必ず同時に変更する
    window.APP_VERSION = "v2.2.1";
    document.getElementById("app-ver").textContent = window.APP_VERSION;
  </script>
  <script type="module">
    import {
      PoseLandmarker, FilesetResolver, DrawingUtils
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/vision_bundle.mjs";

    const $ = id => document.getElementById(id);
    const video    = $("video"),   canvas  = $("canvas"),   ctx  = canvas.getContext("2d");
    const videoB   = $("video-b"), canvasB = $("canvas-b"), ctxB = canvasB.getContext("2d");
    const status   = $("status");
    const controls = $("controls"), btnPlay = $("btn-play"), seek = $("seek"), speed = $("speed");
    const graph    = $("graph"),  gctx = graph.getContext("2d");

    let poseLandmarker = null;
    let poseLandmarkerB = null;   // B 専用 (VIDEO mode の timestamp 単調性をAと分離)
    let visionFileset = null;
    let lastT = -1, lastTB = -1;
    let mode = null;            // "camera" | "file"
    let compareOn = false;
    let cameraStream = null;
    let fileUrl = null, fileUrlB = null;

    // ---- 軌跡 (#124) ----
    let trailOn = true;
    let trail = [];             // {x, y, t}  正規化座標
    const TRAIL_MAX = 400;

    // ---- ボール軌跡 (フレーム差分検出, ベータ) ----
    let ballOn = false;
    let ballTrail = [];         // {x, y, t}  正規化座標
    const BALL_MAX = 300;
    const BALL_W = 160;         // 縮小解析の幅 (px)
    let ballH = 0;
    const ballCv = document.createElement("canvas");
    const bctx = ballCv.getContext("2d", { willReadFrequently: true });
    let prevPix = null;
    let ballSkip = 0;

    // ---- 時系列サンプル (#125/#126/#128) ----
    let samples = new Map();    // key: round(t*30) -> {t, wx, wy, torso, torsoR, kneeL, kneeR, wl}
    let analysis = null;        // {keyframes, tempo, postureKeep}

    // ---- 3D 比較 (#134) ----
    let samplesB = new Map();   // 比較動画 B の時系列 (3D 用)
    let analysisB = null;
    let view3dOn = false;
    let yaw3d = 0.6, pitch3d = 0.1, bFlip = false;
    const view3d = $("view3d"), v3ctx = view3d.getContext("2d");

    function createLandmarker() {
      return PoseLandmarker.createFromOptions(visionFileset, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
          delegate: "GPU",
        },
        runningMode: "VIDEO",
        numPoses: 1,
      });
    }
    async function initPose() {
      status.textContent = "MediaPipe を読み込み中...";
      visionFileset = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm"
      );
      poseLandmarker = await createLandmarker();
      status.textContent = "準備完了 — カメラ起動 または 動画を選択";
    }

    // ---------- ソース管理 ----------
    function stopCurrentSource() {
      if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
      video.srcObject = null;
      if (fileUrl) { URL.revokeObjectURL(fileUrl); fileUrl = null; }
      video.removeAttribute("src");
      lastT = -1;
      trail = [];
      ballTrail = []; prevPix = null; ballH = 0; ballSkip = 0;
      samples = new Map();
      analysis = null;
      samplesB = new Map(); analysisB = null; lastTB = -1;
      if (view3dOn) draw3D();
      $("keyframes").classList.remove("active");
      $("btn-analyze").disabled = true;
      drawGraph();
    }

    $("btn-camera").addEventListener("click", async () => {
      stopCurrentSource();
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: 640, height: 480 },
          audio: false,
        });
        video.srcObject = cameraStream;
        await video.play();
        mode = "camera";
        controls.classList.remove("active");
        canvas.width  = video.videoWidth  || 480;
        canvas.height = video.videoHeight || 640;
        status.textContent = "検出中...";
        startLoop();
      } catch (e) {
        status.textContent = "カメラエラー: " + e.message;
      }
    });

    $("btn-video").addEventListener("click", () => $("file-input").click());
    $("file-input").addEventListener("change", () => {
      const file = $("file-input").files[0];
      if (!file) return;
      stopCurrentSource();
      fileUrl = URL.createObjectURL(file);
      video.src = fileUrl;
      video.loop = true;
      mode = "file";
      video.addEventListener("loadedmetadata", () => {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.style.aspectRatio = `${video.videoWidth} / ${video.videoHeight}`;
        controls.classList.add("active");
        $("btn-analyze").disabled = false;
        status.textContent = "再生すると角度を記録します。一通り再生後「スイング解析」";
        video.play().catch(() => {});
        startLoop();
      }, { once: true });
      $("file-input").value = "";
    });

    // ---------- 比較モード (#127) ----------
    $("btn-compare").addEventListener("click", () => {
      if (!compareOn) {
        $("file-input-b").click();
      } else {
        compareOn = false;
        document.body.classList.remove("compare");
        $("label-a").style.display = "none";
        $("btn-compare").textContent = "比較+";
        if (fileUrlB) { URL.revokeObjectURL(fileUrlB); fileUrlB = null; }
        videoB.removeAttribute("src");
        samplesB = new Map(); analysisB = null; lastTB = -1;
      }
    });
    $("file-input-b").addEventListener("change", async () => {
      const file = $("file-input-b").files[0];
      if (!file) return;
      samplesB = new Map(); analysisB = null;
      if (!poseLandmarkerB && visionFileset) {
        status.textContent = "比較用の検出器を準備中...";
        try { poseLandmarkerB = await createLandmarker(); }
        catch (e) {
          status.textContent = "比較用検出器の初期化失敗: " + e.message;
          $("file-input-b").value = "";
          return;
        }
      }
      fileUrlB = URL.createObjectURL(file);
      videoB.src = fileUrlB;
      videoB.loop = true;
      videoB.addEventListener("loadedmetadata", () => {
        canvasB.width  = videoB.videoWidth;
        canvasB.height = videoB.videoHeight;
        canvasB.style.aspectRatio = `${videoB.videoWidth} / ${videoB.videoHeight}`;
        compareOn = true;
        document.body.classList.add("compare");
        $("label-a").style.display = "";
        $("btn-compare").textContent = "比較解除";
        status.textContent = "比較モード: 再生/シークは A/B 同期します";
        videoB.play().catch(() => {});
        startLoop();
      }, { once: true });
      $("file-input-b").value = "";
    });

    // ---------- 再生コントロール ----------
    btnPlay.addEventListener("click", () => {
      if (video.paused) { video.play(); if (compareOn) videoB.play(); }
      else { video.pause(); if (compareOn) videoB.pause(); }
    });
    video.addEventListener("play",  () => { btnPlay.textContent = "⏸"; });
    video.addEventListener("pause", () => { btnPlay.textContent = "▶"; });

    let seeking = false;
    seek.addEventListener("input", () => {
      if (!video.duration) return;
      seeking = true;
      video.pause(); if (compareOn) videoB.pause();
      const t = (seek.value / 1000) * video.duration;
      video.currentTime = t;
      if (compareOn && videoB.duration) {
        videoB.currentTime = Math.min(t, videoB.duration);
      }
    });
    seek.addEventListener("change", () => { seeking = false; });
    video.addEventListener("timeupdate", () => {
      if (!seeking && video.duration) {
        seek.value = Math.round((video.currentTime / video.duration) * 1000);
      }
    });
    speed.addEventListener("change", () => {
      video.playbackRate = parseFloat(speed.value);
      videoB.playbackRate = parseFloat(speed.value);
    });

    // ---------- 軌跡 ----------
    $("btn-trail").addEventListener("click", () => {
      trailOn = !trailOn;
      $("btn-trail").textContent = trailOn ? "軌跡 ON" : "軌跡 OFF";
      $("btn-trail").classList.toggle("toggled", trailOn);
    });
    $("btn-trail-clear").addEventListener("click", () => { trail = []; ballTrail = []; });

    // ---------- ボール軌跡 ----------
    $("btn-ball").addEventListener("click", () => {
      ballOn = !ballOn;
      $("btn-ball").textContent = ballOn ? "ボール ON" : "ボール OFF";
      $("btn-ball").classList.toggle("toggled", ballOn);
      if (ballOn) {
        status.textContent = "ボール軌跡 (ベータ): 白く明るい球を追跡。高速の打球は検出できないことがあります";
      } else {
        prevPix = null;
      }
    });

    // フレーム差分 + 輝度でボール候補を検出 (1フレームおき、体まわりは除外)
    function detectBall(vid, lm, w, h, t) {
      ballSkip = (ballSkip + 1) % 2;
      if (ballSkip !== 0) return;
      if (!ballH) {
        ballH = Math.max(1, Math.round(BALL_W * h / w));
        ballCv.width = BALL_W; ballCv.height = ballH;
        prevPix = null;
      }
      bctx.drawImage(vid, 0, 0, BALL_W, ballH);
      const cur = bctx.getImageData(0, 0, BALL_W, ballH).data;
      if (prevPix && prevPix.length === cur.length) {
        // 体の bounding box (visibility 0.5 以上のみ) + マージンを除外
        let bx0 = 1, by0 = 1, bx1 = 0, by1 = 0;
        for (const p of lm) {
          if ((p.visibility ?? 1) < 0.5) continue;
          if (p.x < bx0) bx0 = p.x; if (p.y < by0) by0 = p.y;
          if (p.x > bx1) bx1 = p.x; if (p.y > by1) by1 = p.y;
        }
        const m = 0.06;
        const ex0 = (bx0 - m) * BALL_W, ey0 = (by0 - m) * ballH;
        const ex1 = (bx1 + m) * BALL_W, ey1 = (by1 + m) * ballH;

        // クラブヘッド推定位置を除外 (右肘→手首ベクトルを延長)
        // 右肘=lm[14] 右手首=lm[16]。延長係数 1.6 でシャフト先端を推定
        const elbow = lm[14], wrist = lm[16];
        const clubExZones = [];
        if ((elbow.visibility ?? 1) >= 0.4 && (wrist.visibility ?? 1) >= 0.4) {
          const dx = wrist.x - elbow.x, dy = wrist.y - elbow.y;
          const clubX = (wrist.x + dx * 1.6) * BALL_W;
          const clubY = (wrist.y + dy * 1.6) * ballH;
          clubExZones.push({ cx: clubX, cy: clubY, r: 0.14 * BALL_W });
        }
        // 左手首 (lm[15]) 周辺も除外 (グリップが太く検出されやすい)
        const wristL = lm[15];
        if ((wristL.visibility ?? 1) >= 0.4) {
          clubExZones.push({ cx: wristL.x * BALL_W, cy: wristL.y * ballH, r: 0.08 * BALL_W });
        }
        // 平均輝度から適応閾値 (屋外/室内差を吸収)
        let lum = 0, n = 0;
        for (let i = 0; i < cur.length; i += 64) { lum += cur[i] + cur[i+1] + cur[i+2]; n++; }
        lum /= n;
        const brightTh = Math.max(430, lum * 1.45);
        const MOTION_TH = 90;
        // 8px グリッドに候補ピクセルを集計
        const gw = Math.ceil(BALL_W / 8), gh = Math.ceil(ballH / 8);
        const cnt = new Uint16Array(gw * gh);
        const sx = new Float32Array(gw * gh), sy = new Float32Array(gw * gh);
        for (let y = 0; y < ballH; y++) {
          const inY = y >= ey0 && y <= ey1;
          for (let x = 0; x < BALL_W; x++) {
            if (inY && x >= ex0 && x <= ex1) continue;
            // クラブヘッド推定ゾーン除外
            if (clubExZones.some(z => (x - z.cx) ** 2 + (y - z.cy) ** 2 < z.r ** 2)) continue;
            const i = (y * BALL_W + x) * 4;
            const motion = Math.abs(cur[i] - prevPix[i])
                         + Math.abs(cur[i+1] - prevPix[i+1])
                         + Math.abs(cur[i+2] - prevPix[i+2]);
            if (motion < MOTION_TH) continue;
            if (cur[i] + cur[i+1] + cur[i+2] < brightTh) continue;
            const g = (y >> 3) * gw + (x >> 3);
            cnt[g]++; sx[g] += x; sy[g] += y;
          }
        }
        // 小さい塊 (2〜48px) のうち最大のセルを採用
        let best = -1, bestC = 0;
        for (let g = 0; g < cnt.length; g++) {
          if (cnt[g] >= 2 && cnt[g] <= 48 && cnt[g] > bestC) { best = g; bestC = cnt[g]; }
        }
        if (best >= 0) {
          const px = sx[best] / cnt[best] / BALL_W;
          const py = sy[best] / cnt[best] / ballH;
          const last = ballTrail[ballTrail.length - 1];
          let ok = true;
          if (last && t - last.t < 0.3) {
            const d = Math.hypot(px - last.x, py - last.y);
            if (d > 0.25) {
              // 大ジャンプは直前の進行方向と一致する時だけ許容 (高速打球)
              const prev = ballTrail[ballTrail.length - 2];
              ok = !!prev &&
                (last.x - prev.x) * (px - last.x) + (last.y - prev.y) * (py - last.y) > 0;
            }
          }
          if (ok) {
            ballTrail.push({ x: px, y: py, t });
            if (ballTrail.length > BALL_MAX) ballTrail.shift();
          }
        }
      }
      prevPix = cur;
    }

    function drawBallTrail(c, w, h) {
      if (!ballOn || ballTrail.length === 0) return;
      c.strokeStyle = "rgba(255,255,255,0.85)";
      c.lineWidth = 2;
      for (let i = 1; i < ballTrail.length; i++) {
        const a = ballTrail[i - 1], b = ballTrail[i];
        if (b.t - a.t > 0.5) continue;   // 検出が途切れた区間は線で繋がない
        c.beginPath();
        c.moveTo(a.x * w, a.y * h);
        c.lineTo(b.x * w, b.y * h);
        c.stroke();
      }
      c.fillStyle = "#ffee66";
      for (const p of ballTrail) {
        c.beginPath();
        c.arc(p.x * w, p.y * h, 3, 0, Math.PI * 2);
        c.fill();
      }
    }

    function drawTrail(c, w, h) {
      if (!trailOn || trail.length < 2) return;
      for (let i = 1; i < trail.length; i++) {
        const a = trail[i - 1], b = trail[i];
        const age = (trail.length - i) / trail.length;   // 0=新しい 1=古い
        c.strokeStyle = `rgba(255, ${Math.round(220 - 160 * age)}, 60, ${1 - age * 0.8})`;
        c.lineWidth = 3;
        c.beginPath();
        c.moveTo(a.x * w, a.y * h);
        c.lineTo(b.x * w, b.y * h);
        c.stroke();
      }
    }

    // ---------- 検出ループ ----------
    let loopRunning = false;
    function startLoop() {
      if (!loopRunning) { loopRunning = true; requestAnimationFrame(detect); }
    }

    function processFrame(vid, c, w, h, isMain) {
      const lmkr = isMain ? poseLandmarker : poseLandmarkerB;
      c.drawImage(vid, 0, 0, w, h);
      if (!lmkr) return;
      const result = lmkr.detectForVideo(vid, performance.now());
      if (result.landmarks.length > 0) {
        const lm = result.landmarks[0];
        const wl = result.worldLandmarks?.[0];
        const du = new DrawingUtils(c);
        du.drawLandmarks(lm, { color: "#00ff88", lineWidth: 2, radius: 4 });
        du.drawConnectors(lm, PoseLandmarker.POSE_CONNECTIONS, { color: "#00aaff", lineWidth: 2 });
        if (isMain) {
          updateAngles(lm);
          const wrist = lm[16];   // 右手首 (右打ち想定)
          trail.push({ x: wrist.x, y: wrist.y, t: vid.currentTime });
          if (trail.length > TRAIL_MAX) trail.shift();
          if (mode === "file") recordSample(vid.currentTime, lm, wl);
          if (ballOn) detectBall(vid, lm, w, h, vid.currentTime);
        } else {
          // 比較動画 B: 3D 比較用に時系列を記録
          recordSampleB(vid.currentTime, lm, wl);
        }
      }
      if (isMain) { drawTrail(c, w, h); drawBallTrail(c, w, h); }
    }

    function detect() {
      if (poseLandmarker) {
        if (video.readyState >= 2 && video.currentTime !== lastT) {
          lastT = video.currentTime;
          processFrame(video, ctx, canvas.width, canvas.height, true);
        }
        if (compareOn && videoB.readyState >= 2 && videoB.currentTime !== lastTB) {
          lastTB = videoB.currentTime;
          processFrame(videoB, ctxB, canvasB.width, canvasB.height, false);
        }
        if (view3dOn && !video.paused) draw3D();
      }
      requestAnimationFrame(detect);
    }

    // ---------- 角度 ----------
    function angleDeg(a, b, c) {
      const ab = { x: a.x - b.x, y: a.y - b.y };
      const cb = { x: c.x - b.x, y: c.y - b.y };
      const dot = ab.x * cb.x + ab.y * cb.y;
      const mag = Math.sqrt((ab.x**2 + ab.y**2) * (cb.x**2 + cb.y**2));
      if (mag === 0) return 0;
      return Math.round(Math.acos(Math.min(1, Math.max(-1, dot / mag))) * 180 / Math.PI);
    }
    function computeAngles(lm) {
      return {
        torso:  angleDeg(lm[11], lm[23], lm[25]),
        torsoR: angleDeg(lm[12], lm[24], lm[26]),
        kneeL:  angleDeg(lm[23], lm[25], lm[27]),
        kneeR:  angleDeg(lm[24], lm[26], lm[28]),
      };
    }
    function updateAngles(lm) {
      const a = computeAngles(lm);
      $("val-torso").textContent   = a.torso  + "°";
      $("val-torso-r").textContent = a.torsoR + "°";
      $("val-knee-l").textContent  = a.kneeL  + "°";
      $("val-knee-r").textContent  = a.kneeR  + "°";
    }

    // ---------- 時系列記録 ----------
    function packWorld(wl) {
      if (!wl) return null;
      const f = new Float32Array(99);
      for (let i = 0; i < 33; i++) {
        f[i*3] = wl[i].x; f[i*3+1] = wl[i].y; f[i*3+2] = wl[i].z;
      }
      return f;
    }
    function recordSample(t, lm, wl) {
      const key = Math.round(t * 30);
      if (samples.has(key)) return;
      const a = computeAngles(lm);
      samples.set(key, { t, wx: lm[16].x, wy: lm[16].y, ...a, wl: packWorld(wl) });
      if (samples.size % 30 === 0) drawGraph();
    }
    function recordSampleB(t, lm, wl) {
      const key = Math.round(t * 30);
      if (samplesB.has(key)) return;
      const a = computeAngles(lm);
      samplesB.set(key, { t, wx: lm[16].x, wy: lm[16].y, ...a, wl: packWorld(wl) });
    }

    // ---------- スイング解析 (#125 キーフレーム + #128 テンポ) ----------
    $("btn-analyze").addEventListener("click", () => {
      const s = [...samples.values()].sort((p, q) => p.t - q.t);
      if (s.length < 20) {
        status.textContent = "サンプル不足。動画を最初から最後まで一度再生してから解析してね";
        return;
      }
      analysis = analyzeSwing(s);
      renderAnalysis(s);
      saveHistory(s);
      const sb = [...samplesB.values()].sort((p, q) => p.t - q.t);
      analysisB = sb.length >= 20 ? analyzeSwing(sb) : null;
      status.textContent = "解析完了！キーフレームをタップでジャンプ";
    });

    function analyzeSwing(s) {
      // 速度 (正規化座標/秒)
      const v = s.map((p, i) => {
        if (i === 0) return 0;
        const dt = p.t - s[i-1].t || 1/30;
        return Math.hypot(p.wx - s[i-1].wx, p.wy - s[i-1].wy) / dt;
      });
      // インパクト候補: 速度最大
      let impactIdx = v.indexOf(Math.max(...v));
      // トップ: インパクト前で手首が最も高い (wy 最小)
      let topIdx = 0, minY = Infinity;
      for (let i = 0; i < impactIdx; i++) {
        if (s[i].wy < minY) { minY = s[i].wy; topIdx = i; }
      }
      // アドレス: トップ前で速度が低い最後の区間
      const slow = Math.max(...v) * 0.06;
      let addressIdx = 0;
      for (let i = topIdx; i >= 0; i--) {
        if (v[i] < slow) { addressIdx = i; break; }
      }
      // フィニッシュ: インパクト後に速度が落ちた点
      let finishIdx = s.length - 1;
      for (let i = impactIdx; i < s.length; i++) {
        if (v[i] < slow) { finishIdx = i; break; }
      }
      const back = s[topIdx].t - s[addressIdx].t;
      const down = s[impactIdx].t - s[topIdx].t;
      const ratio = down > 0.01 ? back / down : 0;
      const torsoVals = s.slice(addressIdx, impactIdx + 1).map(p => p.torso);
      const postureKeep = torsoVals.length ? Math.max(...torsoVals) - Math.min(...torsoVals) : 0;
      return {
        keyframes: {
          "アドレス":   s[addressIdx].t,
          "トップ":     s[topIdx].t,
          "インパクト": s[impactIdx].t,
          "フィニッシュ": s[finishIdx].t,
        },
        back, down, ratio, postureKeep,
      };
    }

    function renderAnalysis(s) {
      const kf = $("kf-buttons");
      kf.innerHTML = "";
      for (const [name, t] of Object.entries(analysis.keyframes)) {
        const b = document.createElement("button");
        b.className = "btn small tertiary";
        b.textContent = `${name} ${t.toFixed(2)}s`;
        b.addEventListener("click", () => {
          video.pause(); if (compareOn) videoB.pause();
          video.currentTime = t;
        });
        kf.appendChild(b);
      }
      const td = $("tempo-display");
      if (analysis.ratio > 0) {
        td.textContent = `${analysis.ratio.toFixed(1)} : 1 (back ${analysis.back.toFixed(2)}s / down ${analysis.down.toFixed(2)}s)`;
        td.className = (analysis.ratio >= 2.7 && analysis.ratio <= 3.3) ? "good" : "off";
      } else {
        td.textContent = "--";
      }
      $("posture-keep").textContent = analysis.postureKeep.toFixed(0) + "°";
      $("keyframes").classList.add("active");
      drawGraph(s);
    }

    // ---------- グラフ (#126) ----------
    const SERIES = [
      { key: "torso",  color: "#7ecf7e", label: "前傾L" },
      { key: "torsoR", color: "#4a90d9", label: "前傾R" },
      { key: "kneeL",  color: "#e0a040", label: "膝L" },
      { key: "kneeR",  color: "#c06ad9", label: "膝R" },
    ];
    function drawGraph(sorted) {
      const s = sorted || [...samples.values()].sort((p, q) => p.t - q.t);
      const W = graph.width = graph.clientWidth * devicePixelRatio;
      const H = graph.height = 140 * devicePixelRatio;
      gctx.clearRect(0, 0, W, H);
      if (s.length < 2) {
        gctx.fillStyle = "#445";
        gctx.font = `${12 * devicePixelRatio}px sans-serif`;
        gctx.fillText("動画を再生すると角度を記録します", 10 * devicePixelRatio, H / 2);
        return;
      }
      const t0 = s[0].t, t1 = s[s.length - 1].t || 1;
      const yMin = 60, yMax = 200;
      const X = t => ((t - t0) / (t1 - t0)) * W;
      const Y = a => H - ((a - yMin) / (yMax - yMin)) * H;
      // キーフレーム縦線
      if (analysis) {
        gctx.strokeStyle = "rgba(255,255,255,0.25)";
        gctx.lineWidth = 1;
        for (const t of Object.values(analysis.keyframes)) {
          gctx.beginPath(); gctx.moveTo(X(t), 0); gctx.lineTo(X(t), H); gctx.stroke();
        }
      }
      for (const se of SERIES) {
        gctx.strokeStyle = se.color;
        gctx.lineWidth = 1.5 * devicePixelRatio;
        gctx.beginPath();
        s.forEach((p, i) => {
          const x = X(p.t), y = Y(p[se.key]);
          i === 0 ? gctx.moveTo(x, y) : gctx.lineTo(x, y);
        });
        gctx.stroke();
      }
      // 凡例
      gctx.font = `${10 * devicePixelRatio}px sans-serif`;
      SERIES.forEach((se, i) => {
        gctx.fillStyle = se.color;
        gctx.fillText(se.label, (6 + i * 44) * devicePixelRatio, 12 * devicePixelRatio);
      });
      // 現在位置
      if (video.duration) {
        gctx.strokeStyle = "#fff";
        gctx.lineWidth = 1 * devicePixelRatio;
        const x = X(video.currentTime);
        gctx.beginPath(); gctx.moveTo(x, 0); gctx.lineTo(x, H); gctx.stroke();
      }
    }
    graph.addEventListener("pointerdown", e => {
      const s = [...samples.values()].sort((p, q) => p.t - q.t);
      if (s.length < 2 || !video.duration) return;
      const rect = graph.getBoundingClientRect();
      const frac = (e.clientX - rect.left) / rect.width;
      const t0 = s[0].t, t1 = s[s.length - 1].t;
      video.pause(); if (compareOn) videoB.pause();
      video.currentTime = t0 + frac * (t1 - t0);
      setTimeout(() => drawGraph(), 100);
    });
    video.addEventListener("timeupdate", () => {
      if (mode === "file") drawGraph();
      if (view3dOn && video.paused) draw3D();  // 再生中は detect ループ側で描画
    });

    // ---------- 3D スイング比較 (#134) ----------
    $("btn-3d").addEventListener("click", () => {
      view3dOn = !view3dOn;
      $("btn-3d").classList.toggle("toggled", view3dOn);
      $("panel-3d").classList.toggle("active", view3dOn);
      if (view3dOn) draw3D();
    });
    $("btn-3d-reset").addEventListener("click", () => { yaw3d = 0.6; pitch3d = 0.1; draw3D(); });
    $("btn-3d-flip").addEventListener("click", () => { bFlip = !bFlip; $("btn-3d-flip").classList.toggle("toggled", bFlip); draw3D(); });

    let dragging = false, dragX = 0, dragY = 0;
    view3d.addEventListener("pointerdown", e => {
      dragging = true; dragX = e.clientX; dragY = e.clientY;
      view3d.setPointerCapture(e.pointerId);
    });
    view3d.addEventListener("pointermove", e => {
      if (!dragging) return;
      yaw3d   += (e.clientX - dragX) * 0.01;
      pitch3d += (e.clientY - dragY) * 0.01;
      pitch3d = Math.min(1.2, Math.max(-1.2, pitch3d));
      dragX = e.clientX; dragY = e.clientY;
      draw3D();
    });
    view3d.addEventListener("pointerup", () => { dragging = false; });

    // 腰中点を原点、肩中点〜腰中点の胴体長 = 1 に正規化 (体格差吸収)
    function normalizeFrame(wl, flip) {
      const g = i => ({ x: wl[i*3], y: wl[i*3+1], z: wl[i*3+2] });
      const hip = g(23), hip2 = g(24), sh = g(11), sh2 = g(12);
      const ox = (hip.x + hip2.x) / 2, oy = (hip.y + hip2.y) / 2, oz = (hip.z + hip2.z) / 2;
      const sx = (sh.x + sh2.x) / 2 - ox, sy = (sh.y + sh2.y) / 2 - oy, sz = (sh.z + sh2.z) / 2 - oz;
      const torso = Math.hypot(sx, sy, sz) || 1;
      const out = new Array(33);
      for (let i = 0; i < 33; i++) {
        let x = (wl[i*3] - ox) / torso;
        const y = (wl[i*3+1] - oy) / torso;
        const z = (wl[i*3+2] - oz) / torso;
        if (flip) x = -x;
        out[i] = { x, y, z };
      }
      return out;
    }

    // yaw/pitch 回転 + 弱透視投影
    function projectFrame(pts, W, H) {
      const cy = Math.cos(yaw3d), sy = Math.sin(yaw3d);
      const cp = Math.cos(pitch3d), sp = Math.sin(pitch3d);
      const S = H * 0.28;
      return pts.map(p => {
        const x1 = p.x * cy + p.z * sy;
        const z1 = -p.x * sy + p.z * cy;
        const y2 = p.y * cp - z1 * sp;
        const z2 = p.y * sp + z1 * cp;
        const persp = 1 / (1 + z2 * 0.15);
        return { x: W / 2 + x1 * S * persp, y: H / 2 + y2 * S * persp };
      });
    }

    function nearestSample(map, t) {
      // key = round(t*30) なので近傍キーを直接引く (O(1))
      const key = Math.round(t * 30);
      for (let d = 0; d <= 6; d++) {
        const s = map.get(key + d) ?? map.get(key - d);
        if (s) return s;
      }
      // 近傍 ±0.2s に無ければ全走査で最近傍 (表示は継続する仕様)
      let best = null, bd = Infinity;
      for (const s of map.values()) {
        const dd = Math.abs(s.t - t);
        if (dd < bd) { bd = dd; best = s; }
      }
      return best;
    }

    // A の時刻 → B の時刻 (キーフレームが両方単調なら区分線形、ダメなら線形)
    function warpTime(t) {
      const sb = samplesB;
      if (sb.size === 0) return null;
      let anchors = null;
      if (analysis && analysisB) {
        const ka = Object.values(analysis.keyframes);
        const kb = Object.values(analysisB.keyframes);
        let mono = true;
        for (let i = 1; i < ka.length; i++) {
          if (ka[i] <= ka[i-1] || kb[i] <= kb[i-1]) { mono = false; break; }
        }
        if (mono) anchors = { ka, kb };
      }
      if (anchors) {
        const { ka, kb } = anchors;
        if (t <= ka[0]) return kb[0];
        if (t >= ka[ka.length-1]) return kb[kb.length-1];
        for (let i = 1; i < ka.length; i++) {
          if (t <= ka[i]) {
            const f = (t - ka[i-1]) / (ka[i] - ka[i-1]);
            return kb[i-1] + f * (kb[i] - kb[i-1]);
          }
        }
      }
      // フォールバック: 両動画の記録範囲を 0〜1 で線形対応
      const sa = [...samples.values()];
      const sbv = [...sb.values()];
      if (sa.length < 2 || sbv.length < 2) return sbv[0]?.t ?? null;
      let a0 = Infinity, a1 = -Infinity, b0 = Infinity, b1 = -Infinity;
      for (const s of sa)  { if (s.t < a0) a0 = s.t; if (s.t > a1) a1 = s.t; }
      for (const s of sbv) { if (s.t < b0) b0 = s.t; if (s.t > b1) b1 = s.t; }
      if (a1 - a0 < 0.01) return b0;
      return b0 + ((t - a0) / (a1 - a0)) * (b1 - b0);
    }

    const BONES = [
      [11,12],[23,24],[11,23],[12,24],            // 胴体
      [11,13],[13,15],[12,14],[14,16],            // 腕
      [23,25],[25,27],[27,31],[24,26],[26,28],[28,32], // 脚
      [15,17],[15,19],[16,18],[16,20],            // 手
    ];
    function drawSkeleton(pts, stroke, fill, alpha) {
      v3ctx.globalAlpha = alpha;
      v3ctx.strokeStyle = stroke;
      v3ctx.lineWidth = 2.5 * devicePixelRatio;
      for (const [a, b] of BONES) {
        v3ctx.beginPath();
        v3ctx.moveTo(pts[a].x, pts[a].y);
        v3ctx.lineTo(pts[b].x, pts[b].y);
        v3ctx.stroke();
      }
      v3ctx.fillStyle = fill;
      for (const i of [0, 11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28]) {
        v3ctx.beginPath();
        v3ctx.arc(pts[i].x, pts[i].y, 3 * devicePixelRatio, 0, Math.PI * 2);
        v3ctx.fill();
      }
      v3ctx.globalAlpha = 1;
    }

    function draw3D() {
      if (!view3dOn) return;
      const W = view3d.width = view3d.clientWidth * devicePixelRatio;
      const H = view3d.height = 280 * devicePixelRatio;
      v3ctx.clearRect(0, 0, W, H);
      const t = video.currentTime || 0;
      const sa = nearestSample(samples, t);
      if (!sa || !sa.wl) {
        v3ctx.fillStyle = "#445";
        v3ctx.font = `${12 * devicePixelRatio}px sans-serif`;
        v3ctx.fillText("動画を再生すると 3D モーションを記録します", 10 * devicePixelRatio, H / 2);
        return;
      }
      // B (プロ) を先に薄く描画
      if (compareOn && samplesB.size > 0) {
        const tb = warpTime(t);
        const sb = tb != null ? nearestSample(samplesB, tb) : null;
        if (sb && sb.wl) {
          drawSkeleton(projectFrame(normalizeFrame(sb.wl, bFlip), W, H), "#4a90d9", "#4a90d9", 0.55);
        }
      }
      drawSkeleton(projectFrame(normalizeFrame(sa.wl, false), W, H), "#7ecf7e", "#aef0ae", 0.95);
      // 地面の目安線
      v3ctx.strokeStyle = "rgba(255,255,255,0.12)";
      v3ctx.lineWidth = 1;
      v3ctx.beginPath();
      v3ctx.moveTo(0, H * 0.82); v3ctx.lineTo(W, H * 0.82);
      v3ctx.stroke();
    }

    // ---------- 履歴 (#129) ----------
    const HIST_KEY = "golf-history-v1";
    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; }
      catch { return []; }
    }
    function saveHistory(s) {
      const hist = loadHistory();
      // サムネイル: 現フレームを縮小保存
      let thumb = "";
      try {
        const tc = document.createElement("canvas");
        tc.width = 96; tc.height = Math.round(96 * canvas.height / canvas.width);
        tc.getContext("2d").drawImage(canvas, 0, 0, tc.width, tc.height);
        thumb = tc.toDataURL("image/jpeg", 0.6);
      } catch {}
      hist.unshift({
        date: new Date().toISOString(),
        ver: window.APP_VERSION,
        ratio: analysis.ratio ? +analysis.ratio.toFixed(2) : null,
        back: +analysis.back.toFixed(2),
        down: +analysis.down.toFixed(2),
        postureKeep: +analysis.postureKeep.toFixed(0),
        keyframes: analysis.keyframes,
        thumb,
      });
      while (hist.length > 20) hist.pop();
      try { localStorage.setItem(HIST_KEY, JSON.stringify(hist)); }
      catch { hist.forEach(h => h.thumb = ""); localStorage.setItem(HIST_KEY, JSON.stringify(hist)); }
      renderHistory();
    }
    function renderHistory() {
      const hist = loadHistory();
      const ul = $("history-list");
      ul.innerHTML = "";
      if (hist.length === 0) {
        ul.innerHTML = "<li><span class='note'>まだ解析履歴がありません</span></li>";
        return;
      }
      hist.forEach((h, i) => {
        const li = document.createElement("li");
        const d = new Date(h.date);
        const ds = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
        li.innerHTML = `
          ${h.thumb ? `<img src="${h.thumb}" alt="">` : ""}
          <div class="hist-info">
            <div>${ds} — テンポ ${h.ratio ?? "--"} : 1</div>
            <div class="note">前傾変動 ${h.postureKeep}° / back ${h.back}s down ${h.down}s</div>
          </div>
          <button class="del" data-i="${i}">✕</button>`;
        li.querySelector(".del").addEventListener("click", () => {
          const hh = loadHistory(); hh.splice(i, 1);
          localStorage.setItem(HIST_KEY, JSON.stringify(hh));
          renderHistory();
        });
        ul.appendChild(li);
      });
    }
    $("btn-export").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(loadHistory(), null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `golf-history-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    });

    renderHistory();
    drawGraph();
    initPose().catch(e => { status.textContent = "初期化失敗: " + e.message; });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
